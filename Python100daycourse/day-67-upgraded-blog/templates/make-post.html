{% block content %} {% include "header.html" %}

<!-- Page Header -->
<header
  class="masthead"
  style="background-image: url('../static/assets/img/edit-bg.jpg')"
>
  <div class="container position-relative px-4 px-lg-5">
    <div class="row gx-4 gx-lg-5 justify-content-center">
      <div class="col-md-10 col-lg-8 col-xl-7">
        <div class="page-heading">
          <!-- TODO: Show a different h1 if editing existing post -->
          <h1>New Post</h1>
          <span class="subheading">You're going to make a great blog post!</span>
          <form method="POST">
            {{ form.hidden_tag() }}
            <div class="mb-3">
              <label for="title" class="form-label">Blog Post Title</label>
              <input type="text" class="form-control" id="title" name="title" required>
            </div>
            
            <div class="mb-3">
              <label for="subtitle" class="form-label">Subtitle</label>
              <input type="text" class="form-control" id="subtitle" name="subtitle" required>
            </div>
            
            <div class="mb-3">
              <label for="author" class="form-label">Author's Name</label>
              <input type="text" class="form-control" id="author" name="author" required>
            </div>
            <div class="mb-3">
                    <label for="img-url" class="form-label">Background Image URL</label>
                    <input type="url" class="form-control" id="img-url" name="img_url" required>
            </div>
                  
            <div class="mb-3">
                <label for="body" class="form-label">Post Body</label>
                {{ form.body() }}
            </div>
            <button type="submit" class="btn btn-primary">Publish Post</button>
          </form>      
      </div>
    </div>
  </div>
</header>

<main class="mb-4">
  <div class="container">
    <div class="row">
      <div class="col-lg-8 col-md-10 mx-auto">
        <!-- TODO:-Add CKEditor and render the form here -->
      </div>
    </div>
  </div>
</main>
{% include "footer.html" %}
{{ ckeditor.load() }}
{% endblock %}
